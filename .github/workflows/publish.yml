name: Publish on data change

# When data merges to main (any of the 7 item-class directories or
# schema/), bump the patch version, commit, tag vX.Y.Z, and push.
# The tag triggers release.yml, which publishes to npm via trusted
# publishing and then notifies the website to pick up the new version.
#
# Path filters prevent a self-loop: the version-bump commit doesn't
# touch data dirs, so this workflow doesn't re-trigger from its own
# commit.

on:
  push:
    branches: [main]
    paths:
      - 'authority/**'
      - 'code-status/**'
      - 'spelling-system/**'
      - 'system-code/**'
      - 'system-relation/**'
      - 'system-relation-type/**'
      - 'system-status/**'
      - 'schema/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - uses: pnpm/action-setup@v4
        with:
          version: '11'

      - run: pnpm install --frozen-lockfile=false

      - name: Validate before tagging
        run: node scripts/validate.mjs

      - name: Bump patch, commit, tag, push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          # Strip leading "v" if npm version emits one (npm 11+ does)
          RAW=$(npm version patch --no-git-tag-version)
          NEW_VERSION="${RAW#v}"
          git add package.json
          DATE=$(date -u +%Y%m%d)
          git commit -m "chore(release): iso24229-data v$NEW_VERSION ($DATE)

          Triggered by data merge ${{ github.sha }}."
          git tag "v$NEW_VERSION"
          git push origin HEAD --tags
          echo "Released v$NEW_VERSION"
