name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# Trusted publishing via OIDC. Requires the npm package to be configured
# with this workflow as a trusted publisher on npmjs.com (repo:
# iso24229/iso24229-data, workflow file: release.yml). No NPM_TOKEN
# secret is used.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: '11'

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - run: pnpm install --frozen-lockfile

      - name: Validate before publish
        run: node scripts/validate.mjs

      - name: Publish
        run: npm publish --provenance --access public

      - name: Notify website to pick up the new version
        if: success()
        env:
          GH_TOKEN: ${{ secrets.ISO24229_CI_PAT_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          response=$(curl -sS -o /tmp/response.json -w "%{http_code}" -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/iso24229/iso24229.github.io/dispatches \
            -d "{\"event_type\":\"package-published\",\"client_payload\":{\"package\":\"@iso24229/iso24229-data\",\"version\":\"$VERSION\",\"sha\":\"${{ github.sha }}\"}}")
          echo "HTTP status: $response"
          cat /tmp/response.json
          if [ "$response" != "204" ]; then
            echo "::warning::Failed to notify website (HTTP $response). Publish itself succeeded."
          fi
