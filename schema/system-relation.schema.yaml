# JSON Schema for system-relation entries.

$schema: https://json-schema.org/draft/2020-12/schema
$id: https://iso24229.org/schemas/register/system-relation.schema.yaml
title: System Relation
type: object
additionalProperties: false
required: [uuid, type, targetSystem, registrationStatus, createdAt, updatedAt]
properties:
  uuid: { type: string, minLength: 1 }
  type:
    type: string
    enum: [basedOn, basisFor, aliasOf, adoptedFrom, supersedes, supersededBy, relatedTo]
  targetSystem: { type: string, minLength: 1 }
  registrationStatus:
    type: string
    enum: [proposed, accepted, notAccepted, withdrawn, superseded, retired]
    description: ISO 19135 registration lifecycle state for this entry.
  remarks: { type: string }
  createdAt: { type: string, format: date-time }
  updatedAt: { type: string, format: date-time }
